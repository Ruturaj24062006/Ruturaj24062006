<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" height="200" fill="none">
  <!-- Core Design Styles -->
  <style>
    .name-text {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 36px;
      font-weight: 800;
      fill: #f0f6fc;
      letter-spacing: -0.75px;
    }
    .role-text {
      font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 15px;
      font-weight: 500;
      fill: #58a6ff;
      letter-spacing: 0.25px;
    }
    .grid-dot {
      fill: #30363d;
      opacity: 0.4;
    }
    .border-line {
      stroke: #30363d;
      stroke-width: 1px;
      opacity: 0.8;
    }
    
    /* Typing Effect Animations */
    @keyframes type {
      0%, 10% { width: 0; }
      70%, 85% { width: 388px; } /* 43 characters * approx 9px = 388px */
      95%, 100% { width: 0; }
    }
    @keyframes cursor-move {
      0%, 10% { transform: translateX(0); }
      70%, 85% { transform: translateX(388px); }
      95%, 100% { transform: translateX(0); }
    }
    @keyframes blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }

    #clip-rect {
      animation: type 7s steps(43) infinite;
    }
    .cursor {
      animation: cursor-move 7s steps(43) infinite, blink 0.9s infinite;
    }
  </style>

  <!-- Background Canvas -->
  <rect width="1200" height="200" rx="8" fill="#0d1117"/>
  
  <!-- Subtle Border Outer Stroke -->
  <rect x="0.5" y="0.5" width="1199" height="199" rx="7.5" stroke="#30363d" stroke-width="1"/>

  <!-- Elegant Dot Grid Backdrop (Right Side) -->
  <g class="grid-dot">
    <circle cx="850" cy="40" r="1.5" />
    <circle cx="890" cy="40" r="1.5" />
    <circle cx="930" cy="40" r="1.5" />
    <circle cx="970" cy="40" r="1.5" />
    <circle cx="1010" cy="40" r="1.5" />
    <circle cx="1050" cy="40" r="1.5" />
    <circle cx="1090" cy="40" r="1.5" />
    <circle cx="1130" cy="40" r="1.5" />

    <circle cx="850" cy="80" r="1.5" />
    <circle cx="890" cy="80" r="1.5" />
    <circle cx="930" cy="80" r="1.5" />
    <circle cx="970" cy="80" r="1.5" />
    <circle cx="1010" cy="80" r="1.5" />
    <circle cx="1050" cy="80" r="1.5" />
    <circle cx="1090" cy="80" r="1.5" />
    <circle cx="1130" cy="80" r="1.5" />

    <circle cx="850" cy="120" r="1.5" />
    <circle cx="890" cy="120" r="1.5" />
    <circle cx="930" cy="120" r="1.5" />
    <circle cx="970" cy="120" r="1.5" />
    <circle cx="1010" cy="120" r="1.5" />
    <circle cx="1050" cy="120" r="1.5" />
    <circle cx="1090" cy="120" r="1.5" />
    <circle cx="1130" cy="120" r="1.5" />

    <circle cx="850" cy="160" r="1.5" />
    <circle cx="890" cy="160" r="1.5" />
    <circle cx="930" cy="160" r="1.5" />
    <circle cx="970" cy="160" r="1.5" />
    <circle cx="1010" cy="160" r="1.5" />
    <circle cx="1050" cy="160" r="1.5" />
    <circle cx="1090" cy="160" r="1.5" />
    <circle cx="1130" cy="160" r="1.5" />
  </g>

  <!-- Left Accent Structural Line -->
  <line x1="60" y1="40" x2="60" y2="160" class="border-line" />

  <!-- Typography Content -->
  <g transform="translate(90, 0)">
    <!-- Name -->
    <text x="0" y="90" class="name-text">RUTURAJ AMBURE</text>

    <!-- Animated Typing Role -->
    <g transform="translate(0, 128)">
      <!-- Clip Path reveal for text -->
      <g clip-path="url(#type-clip)">
        <text x="0" y="0" class="role-text">Applied Machine Learning &amp; Systems Engineer</text>
      </g>
      
      <!-- Blinking block cursor -->
      <rect class="cursor" x="0" y="-12" width="8" height="15" fill="#58a6ff" />
    </g>
  </g>

  <!-- Definition of clip-path -->
  <defs>
    <clipPath id="type-clip">
      <rect id="clip-rect" x="0" y="-20" width="0" height="40" />
    </clipPath>
  </defs>
</svg>
