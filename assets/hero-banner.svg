<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" fill="none">
  <!-- Native Dark Theme Background -->
  <rect width="1200" height="280" fill="#0d1117"/>
  
  <!-- Engineering Grid Backdrop (5% opacity) -->
  <path d="M 0 40 L 1200 40 M 0 80 L 1200 80 M 0 120 L 1200 120 M 0 160 L 1200 160 M 0 200 L 1200 200 M 0 240 L 1200 240" stroke="#1f242c" stroke-width="1"/>
  <path d="M 80 0 L 80 280 M 160 0 L 160 280 M 240 0 L 240 280 M 320 0 L 320 280 M 400 0 L 400 280 M 480 0 L 480 280 M 560 0 L 560 280 M 640 0 L 640 280 M 720 0 L 720 280 M 800 0 L 800 280 M 880 0 L 880 280 M 960 0 L 960 280 M 1040 0 L 1040 280 M 1120 0 L 1120 280" stroke="#1f242c" stroke-width="1"/>
  
  <!-- Neural Network Blueprint Schematic on the Right -->
  <g opacity="0.8">
    <!-- Connections Input -> Hidden -->
    <line x1="900" y1="100" x2="1000" y2="70" stroke="#21262d" stroke-width="1"/>
    <line x1="900" y1="100" x2="1000" y2="115" stroke="#21262d" stroke-width="1"/>
    <line x1="900" y1="100" x2="1000" y2="160" stroke="#21262d" stroke-width="1"/>
    <line x1="900" y1="100" x2="1000" y2="205" stroke="#21262d" stroke-width="1"/>
    
    <line x1="900" y1="140" x2="1000" y2="70" stroke="#21262d" stroke-width="1"/>
    <line x1="900" y1="140" x2="1000" y2="115" stroke="#21262d" stroke-width="1"/>
    <line x1="900" y1="140" x2="1000" y2="160" stroke="#21262d" stroke-width="1"/>
    <line x1="900" y1="140" x2="1000" y2="205" stroke="#21262d" stroke-width="1"/>
    
    <line x1="900" y1="180" x2="1000" y2="70" stroke="#21262d" stroke-width="1"/>
    <line x1="900" y1="180" x2="1000" y2="115" stroke="#21262d" stroke-width="1"/>
    <line x1="900" y1="180" x2="1000" y2="160" stroke="#21262d" stroke-width="1"/>
    <line x1="900" y1="180" x2="1000" y2="205" stroke="#21262d" stroke-width="1"/>
    
    <!-- Connections Hidden -> Output -->
    <line x1="1000" y1="70" x2="1100" y2="110" stroke="#21262d" stroke-width="1"/>
    <line x1="1000" y1="70" x2="1100" y2="160" stroke="#21262d" stroke-width="1"/>
    
    <line x1="1000" y1="115" x2="1100" y2="110" stroke="#21262d" stroke-width="1"/>
    <line x1="1000" y1="115" x2="1100" y2="160" stroke="#21262d" stroke-width="1"/>
    
    <line x1="1000" y1="160" x2="1100" y2="110" stroke="#21262d" stroke-width="1"/>
    <line x1="1000" y1="160" x2="1100" y2="160" stroke="#21262d" stroke-width="1"/>
    
    <line x1="1000" y1="205" x2="1100" y2="110" stroke="#21262d" stroke-width="1"/>
    <line x1="1000" y1="205" x2="1100" y2="160" stroke="#21262d" stroke-width="1"/>

    <!-- Input Nodes -->
    <circle cx="900" cy="100" r="5" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="900" cy="140" r="5" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="900" cy="180" r="5" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

    <!-- Hidden Nodes -->
    <circle cx="1000" cy="70" r="5" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="1000" cy="115" r="5" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="1000" cy="160" r="5" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <circle cx="1000" cy="205" r="5" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>

    <!-- Output Nodes (Highlighted with Blue Accent) -->
    <circle cx="1100" cy="110" r="5.5" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    <circle cx="1100" cy="160" r="5.5" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
    
    <!-- Schematic Overlay Text -->
    <text x="880" y="240" fill="#30363d" font-family="monospace" font-size="10">INPUT_LAYER [3]</text>
    <text x="980" y="240" fill="#30363d" font-family="monospace" font-size="10">HIDDEN [4]</text>
    <text x="1080" y="240" fill="#30363d" font-family="monospace" font-size="10">OUT [2]</text>
  </g>

  <!-- Content Typography -->
  <text x="80" y="115" fill="#f0f6fc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="700" letter-spacing="-0.5">RUTURAJ AMBURE</text>
  <text x="80" y="155" fill="#58a6ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" font-weight="600" letter-spacing="1.5">AI / ML ENGINEER</text>
  <text x="80" y="195" fill="#8b949e" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" letter-spacing="0.2">Designing scalable machine learning models and intelligent software systems.</text>
</svg>
