<svg width="800" height="20" viewBox="0 0 800 20" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.8" />
    </linearGradient>
    <filter id="glow" x="-10%" y="-100%" width="120%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Thin glow line -->
  <line x1="10" y1="10" x2="790" y2="10" stroke="url(#glow-grad)" stroke-width="2" filter="url(#glow)" stroke-linecap="round" />
  <!-- Center accent node -->
  <circle cx="400" cy="10" r="4" fill="#a855f7" />
  <circle cx="400" cy="10" r="6" stroke="#38bdf8" stroke-width="1" fill="none" opacity="0.6" />
</svg>
